[runtime]
paper_mode = true
poll_seconds = 20
lookback_bars = 220
no_overnight = true
flatten_hour_utc = 23
state_path = "state/runner_state.json"

[hyperliquid]
base_url = "https://api.hyperliquid.xyz"
wallet_address = "${WALLET_ADDRESS}"
private_key = "${PRIVATE_KEY}"

[market]
symbol = "SOL"
interval = "1m"

[portfolio]
starting_equity = 10000.0

[strategy]
atr_period = 14
compression_lookback = 20
breakout_lookback = 30
vol_period = 30
min_realized_vol = 0.0012
max_realized_vol = 0.02
atr_expansion_mult = 1.5
volume_confirm_mult = 1.4
max_spread_bps = 6.0
min_depth = 80.0
trend_ema_period = 50
take_profit_atr_mult = 2.2
stop_atr_mult = 1.25
trailing_atr_mult = 1.1
max_bars_in_trade = 90
cooldown_bars = 8
chop_threshold = 0.18

[risk]
per_trade_risk_pct = 0.004
daily_loss_limit_pct = 0.02
max_consecutive_losses = 4
max_positions = 1
max_gross_exposure_usd = 22000
max_leverage = 2.0
max_slippage_bps = 10.0
api_failure_kill_switch = 5
stale_data_seconds = 120
extreme_vol_lockout = 0.035
lockout_minutes = 45

[execution]
fee_bps = 2.5
paper_slippage_bps = 1.5
retry_count = 3
order_type = "market"

[alerts]
telegram_bot_token = "${TELEGRAM_BOT_TOKEN}"
telegram_chat_id = "${TELEGRAM_CHAT_ID}"

[logging]
json_log_path = "logs/bot.log"
trade_journal_csv = "logs/trades.csv"

[backtest]
train_ratio = 0.7
slippage_bps = 2.0
